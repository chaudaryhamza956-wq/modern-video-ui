<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pakistani flag</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
        }
        
        .flag-container {
            display: flex;
            border: 2px solid #333;
            width: 400px;
            height: 200px;
        }
        
        .green-box {
            width: 320px;
            height: 200px;
            background-color: #00501f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .white-box {
            width: 80px;
            height: 200px;
            background-color: white;
        }
        
        .moon {
            width: 60px;
            height: 60px;
            border-radius: 50%;                 
            border-left: 15px solid white;     
            position: relative;
        }

        .star {
            font-size: 30px;
            color: white;
            position: absolute;
            top: 8px;
            left: 12px;
        }
    </style>
</head>
<body>
    <h2>🇵🇰 Pakistani Flag 🇵🇰</h2>
    <div class="flag-container">
        <div class="white-box"></div>
        <div class="green-box">
            <div class="moon">
                <div class="star">*</div>
            </div>
        </div>
    </div>
</body>
</html>
